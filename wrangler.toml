# The Realm of Patterns - Cloudflare Configuration
# 100% Cloudflare Native

name = "therealmofpatterns"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# Main account settings
# account_id set via CLOUDFLARE_ACCOUNT_ID env var

# ============================================
# D1 Database (SQLite at the edge)
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "therealmofpatterns-db"
database_id = "f7396c67-c475-40ec-ae4a-acf7b22834a9"

# ============================================
# R2 Object Storage (PDFs, Images)
# ============================================
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "therealmofpatterns-assets"

# ============================================
# KV Namespace (Sessions, Rate Limits)
# ============================================
[[kv_namespaces]]
binding = "CACHE"
id = "9ec0ef8400f5430fbebb73ce6ce64995"

# ============================================
# Workers AI
# ============================================
[ai]
binding = "AI"

# ============================================
# Environment Variables
# ============================================
[vars]
ENVIRONMENT = "production"
APP_NAME = "The Realm of Patterns"
APP_URL = "https://therealmofpatterns.com"

# ============================================
# Development Settings
# ============================================
[dev]
port = 8788
local_protocol = "http"

# ============================================
# Build Settings (handled by Pages)
# ============================================
# [build]
# command = "npm run build"

# ============================================
# Cron Triggers (Scheduled Jobs)
# ============================================
# NOTE: For Pages projects, cron triggers must be configured via:
# 1. Cloudflare Dashboard > Pages > Settings > Functions > Cron Triggers
# 2. OR deploy a separate Worker with cron trigger (recommended)
#
# Cron Schedule (for worker deployment):
#   0 0 * * *   - Daily weather generation for 6 languages
#   0 6 * * *   - Process content queue (10 items)
#   0 12 * * *  - Quality check + retry failed items
#   0 18 * * *  - Regenerate sitemap + analytics summary
#
# Handler: workers/cron-worker.ts

# ============================================
# Secrets (set via wrangler secret put <NAME>)
# ============================================
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# STRIPE_PUBLISHABLE_KEY
# GEMINI_API_KEY (required for content generation)
# ADMIN_KEY (for manual cron triggers)
# TWITTER_BEARER_TOKEN (optional)
# TELEGRAM_BOT_TOKEN (optional)
# DISCORD_WEBHOOK_URL (optional)

# ============================================
# Cron Worker (separate deployment)
# ============================================
# For scheduled content generation, deploy the cron worker:
#   wrangler deploy workers/cron-worker.ts --name therealmofpatterns-cron
#
# Configure cron schedules in Cloudflare Dashboard:
#   Workers > therealmofpatterns-cron > Triggers > Cron Triggers
#
#   Add all four triggers:
#   1. "0 0 * * *"  - Daily at 00:00 UTC - Daily weather generation
#   2. "0 6 * * *"  - Daily at 06:00 UTC - Process content queue
#   3. "0 12 * * *" - Daily at 12:00 UTC - Quality check + retry
#   4. "0 18 * * *" - Daily at 18:00 UTC - Sitemap + analytics
#
# Required secrets for cron worker:
#   wrangler secret put PAGES_URL   # e.g., https://therealmofpatterns.pages.dev
#   wrangler secret put ADMIN_KEY   # Secret for authenticating requests
#   wrangler secret put DISCORD_WEBHOOK_URL  # Optional: for failure alerts
#
# Or for Pages Functions, configure via Dashboard:
#   Pages > therealmofpatterns > Settings > Functions > Cron Triggers

# ============================================
# Cron Worker Wrangler Config (use for standalone deploy)
# ============================================
# To deploy the cron worker standalone, create a wrangler.cron.toml:
#
# name = "therealmofpatterns-cron"
# main = "workers/cron-worker.ts"
# compatibility_date = "2024-01-01"
#
# [triggers]
# crons = ["0 0 * * *", "0 6 * * *", "0 12 * * *", "0 18 * * *"]
#
# Then deploy: wrangler deploy -c wrangler.cron.toml
