# Cosmic Channel - Cloudflare Worker Configuration
name = "cosmic-channel"
main = "src/worker/cosmic-channel.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Durable Objects for WebSocket state management
[[durable_objects.bindings]]
name = "COSMIC_CHANNEL"
class_name = "CosmicChannelDO"

# SQLite-backed Durable Objects (required for free tier)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["CosmicChannelDO"]

[vars]
ENVIRONMENT = "production"
