# Cron Worker Configuration
# Separate worker for handling scheduled tasks
#
# Features:
# - Generates cosmic weather content for 6 languages
# - Updates UV snapshots for subscribed users
# - Processes notification queue
#
# Deploy:
#   cd workers && wrangler deploy
#
# Set secrets:
#   wrangler secret put ADMIN_KEY --name therealmofpatterns-cron
#   wrangler secret put DISCORD_WEBHOOK_URL --name therealmofpatterns-cron  (optional)

name = "therealmofpatterns-cron"
main = "cron-worker.ts"
compatibility_date = "2024-01-01"

# Cron trigger - daily at 00:00 UTC
[triggers]
crons = ["0 0 * * *"]

# Environment variables
[vars]
PAGES_URL = "https://therealmofpatterns.pages.dev"

# Secrets (set via wrangler secret put --name therealmofpatterns-cron):
# ADMIN_KEY - Required: authenticates requests to /api/daily-update
# DISCORD_WEBHOOK_URL - Optional: for failure alerts
