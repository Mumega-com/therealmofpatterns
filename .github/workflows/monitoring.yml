name: Production Monitoring

on:
  schedule:
    # Every 3 hours
    - cron: '17 */3 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  synthetic-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run synthetic checks
        id: checks
        run: node scripts/synthetic-check.mjs 2>&1 | tee check-output.txt

      - name: Open or update incident issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.existsSync('check-output.txt')
              ? fs.readFileSync('check-output.txt', 'utf8')
              : 'No output captured.';
            const title = '🔴 Production synthetic checks failing';
            const body = [
              'Scheduled monitoring detected failures on therealmofpatterns.com.',
              '',
              '```',
              output.slice(-3000),
              '```',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'incident',
            });
            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo, title, body, labels: ['incident'],
              });
            }

      - name: Close incident issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🔴 Production synthetic checks failing';
            const issues = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'incident',
            });
            for (const issue of issues.data.filter(i => i.title === title)) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: issue.number,
                body: '✅ Checks are passing again — auto-closing.',
              });
              await github.rest.issues.update({
                ...context.repo, issue_number: issue.number, state: 'closed',
              });
            }
