name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Check build output
        run: |
          echo "Build completed successfully"
          echo "Pages built: $(find dist -name '*.html' | wc -l)"

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || echo "No lint script configured"

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if tests exist
        id: check-tests
        run: |
          if [ -f "vitest.config.ts" ] || [ -f "vitest.config.js" ] || [ -d "tests" ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check-tests.outputs.has_tests == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check-tests.outputs.has_tests == 'true'
        run: npm ci

      - name: Run tests
        if: steps.check-tests.outputs.has_tests == 'true'
        run: npm test

      - name: Skip tests
        if: steps.check-tests.outputs.has_tests == 'false'
        run: echo "No test configuration found, skipping tests"
