name: Nightly E2E (production)

on:
  schedule:
    # 06:30 UTC daily
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e suite against production
        run: npx playwright test --reporter=line 2>&1 | tee e2e-output.txt

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Open or update incident issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.existsSync('e2e-output.txt')
              ? fs.readFileSync('e2e-output.txt', 'utf8')
              : 'No output captured.';
            const title = '🔴 Nightly e2e against production failing';
            const body = [
              'The nightly Playwright run against therealmofpatterns.com failed.',
              '',
              '```',
              output.slice(-3000),
              '```',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'incident',
            });
            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo, title, body, labels: ['incident'],
              });
            }
