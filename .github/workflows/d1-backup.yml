name: D1 Backup

on:
  schedule:
    # Twice a week: Monday and Thursday 04:00 UTC
    - cron: '0 4 * * 1,4'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Check credentials
        id: creds
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID secrets not set — skipping backup."
          fi

      - name: Checkout
        if: steps.creds.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.creds.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.creds.outputs.available == 'true'
        run: npm ci

      - name: Export D1 database
        if: steps.creds.outputs.available == 'true'
        run: |
          npx wrangler d1 export therealmofpatterns-db --remote \
            --output "d1-backup-$(date +%F).sql"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload backup artifact
        if: steps.creds.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: d1-backup-${{ github.run_id }}
          path: d1-backup-*.sql
          retention-days: 90
