name: D1 Migration (manual)

on:
  workflow_dispatch:
    inputs:
      file:
        description: 'Migration SQL file to apply (path in repo)'
        required: true
        default: 'src/db/migration-telegram-feedback.sql'

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Show migration about to run
        run: |
          echo "Applying: ${{ github.event.inputs.file }}"
          cat "${{ github.event.inputs.file }}"

      - name: Apply migration to remote D1
        run: |
          npx wrangler d1 execute therealmofpatterns-db --remote \
            --file "${{ github.event.inputs.file }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
